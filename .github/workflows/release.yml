name: Release Sub-Tool

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build cross-platform binaries
        run: |
          mkdir builds
          # 获取版本号
          APP_VERSION=${GITHUB_REF#refs/tags/}
          
          # 定义 LDFLAGS
          LDFLAGS="-s -w -X 'main.version=${APP_VERSION}'"
          
          # 强制禁用 CGO
          export CGO_ENABLED=0

          echo "Building for Linux AMD64..."
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="$LDFLAGS" -o builds/sub-tool_linux_amd64
          
          echo "Building for Windows AMD64..."
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="$LDFLAGS" -o builds/sub-tool_windows_amd64.exe
          
          echo "Building for macOS AMD64..."
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="$LDFLAGS" -o builds/sub-tool_macos_amd64
          
          echo "Building for macOS ARM64..."
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="$LDFLAGS" -o builds/sub-tool_macos_arm64
          
          echo "Building for Android ARM64..."
          GOOS=android GOARCH=arm64 go build -trimpath -ldflags="$LDFLAGS" -o builds/sub-tool_android_arm64
          
          # 复制配置文件和说明（确保文件名正确）
          cp template.json.example builds/
          cp README.md builds/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: builds/*
          generate_release_notes: true
